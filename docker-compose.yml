# Digo 운영 서버용 docker-compose
# hipus EC2 → ALB → :3003 (frontend), :3004 (backend)

services:
  backend:
    image: 419286438275.dkr.ecr.ap-northeast-2.amazonaws.com/digo-backend:latest
    container_name: digo-backend
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: 419286438275.dkr.ecr.ap-northeast-2.amazonaws.com/digo-frontend:latest
    container_name: digo-frontend
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - INTERNAL_API_URL=http://backend:3004
    depends_on:
      backend:
        condition: service_healthy
